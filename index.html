<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>次の一冊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:       #1a1714;
  --ink-mid:   #4a4540;
  --ink-faint: #8a847c;
  --ink-ghost: #bfbab2;
  --paper:     #f7f4ef;
  --paper-2:   #edeae3;
  --white:     #ffffff;
  --border:    rgba(26,23,20,0.14);
  --border-s:  rgba(26,23,20,0.22);
  --blue:      #2d4a8a;
  --blue-bg:   #edf0f8;
  --red:       #8a2d2d;
  --red-bg:    #f8eded;
  --green:     #2a6b3c;
  --green-bg:  #eaf3ec;
}

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2.5rem 1.25rem 6rem;
}

header {
  width: 100%;
  max-width: 640px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-s);
  padding-bottom: 1rem;
  margin-bottom: 2rem;
}
.site-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.2rem;
  font-weight: 400;
  letter-spacing: 0.08em;
}
.site-sub { font-size: 0.68rem; color: var(--ink-faint); }

main { width: 100%; max-width: 640px; }

.label {
  font-size: 0.65rem;
  letter-spacing: 0.14em;
  color: var(--ink-faint);
  text-transform: uppercase;
  display: block;
  margin-bottom: 0.6rem;
}

/* source indicator */
.source-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.65rem;
  padding: 3px 9px;
  border-radius: 99px;
  border: 1px solid var(--border-s);
  color: var(--ink-faint);
}
.source-badge.online  { color: var(--green); background: var(--green-bg); border-color: rgba(42,107,60,0.2); }
.source-badge.offline { color: var(--ink-faint); background: var(--paper-2); }
.source-badge.error   { color: var(--red); background: var(--red-bg); border-color: rgba(138,45,45,0.2); }
.source-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

/* mode toggle */
.mode-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin-bottom: 0.6rem;
}
.mode-toggle {
  display: inline-flex;
  border: 1px solid var(--border-s);
  border-radius: 99px;
  padding: 2px;
  background: var(--white);
}
.mode-btn {
  font-size: 0.68rem;
  padding: 4px 12px;
  border: none;
  border-radius: 99px;
  background: transparent;
  cursor: pointer;
  color: var(--ink-faint);
  font-family: 'Noto Sans JP', sans-serif;
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}
.mode-btn.active {
  background: var(--ink);
  color: var(--paper);
}
.mode-btn:hover:not(.active) { background: var(--paper-2); }
.retry-link {
  font-size: 0.65rem;
  color: var(--blue);
  cursor: pointer;
  background: none;
  border: none;
  text-decoration: underline;
  font-family: 'Noto Sans JP', sans-serif;
  padding: 0;
  display: none;
}
.error-detail {
  font-size: 0.6rem;
  color: var(--ink-ghost);
  margin-top: 4px;
  display: none;
  word-break: break-all;
}
.toggle-wrap { margin-bottom: 1.5rem; }

/* genre tag selector */
.tag-selector-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1rem;
  margin-bottom: 1.75rem;
}
.tag-selector-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.7rem;
}
.tag-selector-clear {
  font-size: 0.65rem;
  color: var(--blue);
  cursor: pointer;
  background: none;
  border: none;
  text-decoration: underline;
  font-family: 'Noto Sans JP', sans-serif;
  padding: 0;
}
.tag-chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.tag-chip {
  font-size: 0.7rem;
  padding: 5px 12px;
  border: 1px solid var(--border-s);
  border-radius: 99px;
  background: transparent;
  cursor: pointer;
  color: var(--ink-mid);
  font-family: 'Noto Sans JP', sans-serif;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  white-space: nowrap;
}
.tag-chip:hover { background: var(--paper-2); }
.tag-chip.selected {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.tag-selector-hint {
  font-size: 0.62rem;
  color: var(--ink-ghost);
  margin-top: 0.6rem;
}

/* book inputs */
.books-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 1.75rem;
}
.book-input-card {
  background: var(--white);
  border: 1px solid var(--border-s);
  border-radius: 6px;
  padding: 0.8rem 1rem;
  transition: border-color 0.15s;
}
.book-input-card:focus-within { border-color: var(--blue); }
.book-input-card .num {
  font-size: 0.6rem;
  color: var(--ink-ghost);
  letter-spacing: 0.1em;
  margin-bottom: 0.3rem;
}
.book-input-card input {
  width: 100%;
  border: none;
  background: transparent;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.82rem;
  font-weight: 300;
  color: var(--ink);
  outline: none;
}
.book-input-card input::placeholder { color: var(--ink-ghost); }
.book-note-input {
  margin-top: 0.4rem;
  border-top: 1px solid var(--border);
  padding-top: 0.35rem;
  font-size: 0.72rem !important;
  color: var(--ink-faint) !important;
}

/* radar */
.radar-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1.1rem 1rem 0.8rem;
  margin-bottom: 1.5rem;
}
.radar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.75rem;
  flex-wrap: wrap;
  gap: 0.5rem;
}
.legend { display: flex; gap: 0.9rem; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.65rem; color: var(--ink-faint); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
svg#radar { display: block; margin: 0 auto; overflow: visible; }

/* button */
.find-btn {
  width: 100%;
  padding: 0.9rem;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Noto Serif JP', serif;
  font-size: 0.95rem;
  font-weight: 400;
  letter-spacing: 0.1em;
  transition: opacity 0.2s;
  margin-bottom: 1.25rem;
}
.find-btn:hover:not(:disabled) { opacity: 0.82; }
.find-btn:active:not(:disabled) { opacity: 0.65; }
.find-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* progress */
.progress { margin-bottom: 0.75rem; min-height: 1.2rem; }
.step {
  display: flex; align-items: center; gap: 0.5rem;
  font-size: 0.72rem; color: var(--ink-faint); padding: 2px 0;
}
.dot-spin {
  width: 10px; height: 10px;
  border: 1.5px solid var(--border-s);
  border-top-color: var(--ink-mid);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* error / notice */
.notice {
  font-size: 0.74rem;
  border-radius: 5px;
  padding: 0.6rem 0.9rem;
  margin-bottom: 0.75rem;
  white-space: pre-wrap;
  display: none;
}
.notice.error  { color: var(--red);  background: var(--red-bg);  border: 1px solid rgba(138,45,45,0.2); }
.notice.info   { color: var(--ink-mid); background: var(--paper-2); border: 1px solid var(--border-s); }

/* result */
.result-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1.5rem;
  display: none;
  animation: fadeUp 0.3s ease;
}
.result-card.visible { display: block; }
@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
.result-eyebrow {
  font-size: 0.62rem; letter-spacing: 0.14em; color: var(--ink-faint);
  text-transform: uppercase; margin-bottom: 0.5rem;
}
.result-top-row {
  display: flex;
  gap: 1rem;
  align-items: flex-start;
  margin-bottom: 1.25rem;
}
.result-thumbnail {
  width: 72px;
  height: 108px;
  object-fit: cover;
  border-radius: 3px;
  border: 1px solid var(--border-s);
  flex-shrink: 0;
  background: var(--paper-2);
}
.result-top-text { flex: 1; min-width: 0; }
.result-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.25rem; font-weight: 400; letter-spacing: 0.03em;
  line-height: 1.45; margin-bottom: 0.25rem;
}
.result-author { font-size: 0.78rem; color: var(--ink-mid); margin-bottom: 0.5rem; }
.result-meta-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 0.5rem; }
.result-genre {
  display: inline-block; font-size: 0.6rem; letter-spacing: 0.06em;
  padding: 2px 8px; border-radius: 3px; background: var(--blue-bg); color: var(--blue);
}
.result-source {
  display: inline-block; font-size: 0.6rem; letter-spacing: 0.06em;
  padding: 2px 8px; border-radius: 3px; background: var(--paper-2); color: var(--ink-faint);
}
.result-info-chips {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.info-chip {
  font-size: 0.62rem; color: var(--ink-faint);
  display: inline-flex; align-items: center; gap: 3px;
}

/* 一致度バー */
.match-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.62rem; color: var(--ink-faint); margin-bottom: 0.3rem;
}
.match-bar { height: 2px; background: var(--paper-2); border-radius: 2px; margin-bottom: 1.25rem; overflow: hidden; }
.match-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.6s ease; }
.lock-note {
  font-size: 0.62rem; color: var(--ink-ghost);
  display: flex; align-items: center; gap: 4px; margin-bottom: 1rem;
}
.result-actions {
  display: flex; gap: 8px; flex-wrap: wrap;
  border-top: 1px solid var(--border); padding-top: 1rem;
}
.action-btn {
  font-size: 0.72rem; padding: 6px 12px;
  border: 1px solid var(--border-s); border-radius: 4px;
  background: transparent; cursor: pointer; color: var(--ink-mid);
  font-family: 'Noto Sans JP', sans-serif; transition: background 0.15s;
  text-decoration: none; display: inline-block;
}
.action-btn:hover { background: var(--paper-2); }
.action-btn.danger { color: var(--red); border-color: rgba(138,45,45,0.2); }
.action-btn.danger:hover { background: var(--red-bg); }
.action-btn.amazon { color: var(--blue); border-color: rgba(45,74,138,0.25); }
.action-btn.amazon:hover { background: var(--blue-bg); }

footer {
  width: 100%; max-width: 640px;
  margin-top: 2.5rem;
  font-size: 0.62rem;
  color: var(--ink-ghost);
  text-align: center;
  line-height: 1.7;
}
</style>

<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "10eda9f8068148efb5040475589e8ebd"}'></script>
<!-- End Cloudflare Web Analytics -->
</head>
<body>

<header>
  <span class="site-title">次の一冊</span>
  <span class="site-sub">パラメータ照合 × 静的サイト</span>
</header>

<main>

  <div class="toggle-wrap">
    <div class="mode-row">
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-auto-btn" onclick="setMode('auto')">オンライン優先</button>
        <button class="mode-btn" id="mode-offline-btn" onclick="setMode('offline')">常にオフライン</button>
      </div>
      <span class="source-badge offline" id="source-badge">
        <span class="source-dot"></span>
        <span id="source-badge-text">起動中…</span>
      </span>
    </div>
    <button class="retry-link" id="retry-link" onclick="retryConnection()">→ オンライン接続を再試行</button>
    <div class="error-detail" id="error-detail"></div>
  </div>

  <div class="tag-selector-card">
    <div class="tag-selector-header">
      <span class="label" style="margin:0">探索するジャンル（任意）</span>
      <button class="tag-selector-clear" id="tag-clear-btn" onclick="clearTags()" style="display:none">クリア</button>
    </div>
    <div class="tag-chip-row" id="tag-chip-row"></div>
    <div class="tag-selector-hint" id="tag-hint">未選択の場合は全ジャンルからランダムに探索します</div>
  </div>

  <span class="label">最近読んだ2冊</span>
  <div class="books-grid">
    <div class="book-input-card">
      <div class="num">book 1</div>
      <input type="text" id="b1" placeholder="例: 砂漠">
      <input type="text" id="b1note" class="book-note-input" placeholder="補足（著者名・出版社・任意）">
    </div>
    <div class="book-input-card">
      <div class="num">book 2</div>
      <input type="text" id="b2" placeholder="例: 博士の愛した数式">
      <input type="text" id="b2note" class="book-note-input" placeholder="補足（著者名・出版社・任意）">
    </div>
  </div>

  <div class="radar-card">
    <div class="radar-header">
      <span class="label" style="margin:0">パラメータ空間</span>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#9b8ec4"></div>book 1</div>
        <div class="legend-item"><div class="legend-dot" style="background:#6aaa91"></div>book 2</div>
        <div class="legend-item"><div class="legend-dot" style="background:#2d4a8a; box-shadow:0 0 0 2px #fff,0 0 0 3.5px #2d4a8a"></div>推薦</div>
      </div>
    </div>
    <svg id="radar" viewBox="0 0 320 260" width="320" height="260"></svg>
  </div>

  <button class="find-btn" id="find-btn" onclick="onFind()">次の一冊を見つける</button>

  <div class="notice error" id="error-notice"></div>
  <div class="notice info"  id="info-notice"></div>
  <div class="progress" id="progress"></div>

  <div class="result-card" id="result-card">
    <div class="result-eyebrow">推薦</div>
    <div class="result-top-row">
      <img class="result-thumbnail" id="r-thumbnail" alt="" style="display:none">
      <div class="result-top-text">
        <div class="result-title"  id="r-title"></div>
        <div class="result-author" id="r-author"></div>
        <div class="result-meta-row">
          <span class="result-genre"  id="r-genre"></span>
          <span class="result-source" id="r-source"></span>
        </div>
        <div class="result-info-chips" id="r-info-chips"></div>
      </div>
    </div>

    <div class="match-row"><span>パラメータ一致度</span><span id="r-match-pct"></span></div>
    <div class="match-bar"><div class="match-fill" id="r-match-fill" style="width:0%"></div></div>

    <div class="lock-note">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      選考アルゴリズムは非公開
    </div>
    <div class="result-actions">
      <a class="action-btn amazon" id="r-amazon-link" href="#" target="_blank" rel="noopener">Amazonで見る ↗</a>
      <a class="action-btn" id="r-google-link" href="#" target="_blank" rel="noopener" style="display:none">Google Booksで見る ↗</a>
      <button class="action-btn" onclick="onRetry()">別の一冊 →</button>
      <button class="action-btn danger" onclick="onAlreadyRead()">読んだことある — やり直し</button>
    </div>
  </div>

</main>

<footer>
  本データは Google Books API（取得できない場合は内蔵データベース）を使用しています。<br>
  完全無料・サーバー不要・APIキー不要の静的サイトです。<br>
  推薦結果（入力タイトルと推薦された本のペア）は、サービス品質の改善を目的として記録しています。
</footer>

<script>
// ═══════════════════════════════════════════════════════════
// 定数: パラメータ軸
// ═══════════════════════════════════════════════════════════
const AXES = [
  { key: 'sf',       label: 'SF/幻想'  },
  { key: 'thought',  label: '思想密度' },
  { key: 'emotion',  label: '感情強度' },
  { key: 'darkness', label: '暗度'     },
  { key: 'world',    label: '世界構築' },
  { key: 'prose',    label: '文体'     },
  { key: 'pace',     label: '疾走感'   },
  { key: 'relation', label: '関係性'   },
];

// ═══════════════════════════════════════════════════════════
// 既知の本のプリセットパラメータ（精度の高い手動評価）
// ═══════════════════════════════════════════════════════════
const PRESETS = {
  'ハーモニー':                        { sf:.88, thought:.92, emotion:.72, darkness:.90, world:.85, prose:.78, pace:.62, relation:.68 },
  'ツインスターサイクロンランナウェイ': { sf:.90, thought:.48, emotion:.80, darkness:.30, world:.82, prose:.55, pace:.90, relation:.88 },
  '虐殺器官':       { sf:.95, thought:.90, emotion:.60, darkness:.92, world:.85, prose:.70, pace:.75, relation:.55 },
  'ノルウェイの森':  { sf:.00, thought:.55, emotion:.90, darkness:.65, world:.25, prose:.80, pace:.42, relation:.82 },
  '罪と罰':         { sf:.00, thought:.90, emotion:.92, darkness:.85, world:.45, prose:.85, pace:.40, relation:.75 },

  '雪国':           { sf:.00, thought:.60, emotion:.80, darkness:.55, world:.40, prose:.95, pace:.30, relation:.75 },

};

// ═══════════════════════════════════════════════════════════
// ジャンルタグ（ユーザーが選択可能・選択時はそのタグのみ検索）
// ═══════════════════════════════════════════════════════════
const GENRE_TAGS = [
  { id: 'fiction',   label: '文学・小説',     query: '小説' },
  { id: 'sf',        label: 'SF',            query: 'SF小説' },
  { id: 'fantasy',   label: 'ファンタジー',   query: 'ファンタジー小説' },
  { id: 'mystery',   label: 'ミステリ',      query: 'ミステリ小説' },
  { id: 'philosophy',label: '哲学・思想',    query: '哲学書' },
  { id: 'poetry',    label: '詩・随筆',      query: '詩集 OR 随筆' },
  { id: 'horror',    label: 'ホラー・怪奇',  query: 'ホラー小説 OR 怪奇小説' },
  { id: 'biography', label: '伝記・歴史',    query: '伝記 OR 歴史小説' },
  { id: 'essay',     label: 'エッセイ・批評',query: 'エッセイ OR 文芸批評' },
  { id: 'romance',   label: '恋愛・青春',    query: '恋愛小説 OR 青春小説' },
  { id: 'psychology',label: '心理・社会',    query: '心理学 OR 社会学' },
  { id: 'drama',     label: 'ドラマ・短編',  query: '短編小説' },
  { id: 'jlit',      label: '日本文学',      query: '日本文学 OR 純文学' },
  { id: 'dystopia',  label: 'ディストピア',  query: 'ディストピア小説' },
];

// 後方互換: 全タグのクエリ一覧（タグ未選択時のランダム探索用）
const GENRE_QUERIES = GENRE_TAGS.map(t => t.query);

// カテゴリ文字列 → パラメータ軸 のキーワード対応表
const KEYWORD_MAP = {
  sf:       ['science fiction', 'fantasy', 'dystopia', 'cyberpunk', 'space', 'sf', '幻想', 'SF'],
  thought:  ['philosophy', 'ethics', 'political', 'social science', 'religion', '哲学', '思想'],

// ユーティリティ
// ═══════════════════════════════════════════════════════════
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return h;
}
function jitter01(seed, idx) {
  const x = Math.sin(seed + idx * 999.77) * 10000;
  return x - Math.floor(x);
}
function clamp01(v) { return Math.max(0.05, Math.min(0.95, v)); }

function findPreset(title) {
  for (const key of Object.keys(PRESETS)) {
    if (title.includes(key) || key.includes(title)) return { params: PRESETS[key], canonicalTitle: key };
  }
  return null;
}

// タイトル文字列だけからパラメータを推定（プリセットなし・カテゴリなしの最終手段）
function paramsFromTitleHash(title) {
  const seed = hashStr(title);
  const out = {};
  AXES.forEach((ax, i) => { out[ax.key] = clamp01(0.3 + jitter01(seed, i) * 0.5); });
  return out;
}

// ═══════════════════════════════════════════════════════════
// 実在検証（feature-truebooks）
// 入力タイトルが実在の本かをGoogle Booksで確認し、
// 見つからない場合も「最も近い実在書籍」を裏側で採用する。
// ユーザーには差し替えたことを明示しない。
// ═══════════════════════════════════════════════════════════

// ひらがな → カタカナ変換（Unicode上、ひらがなとカタカナは+0x60の関係にある）
function hiraganaToKatakana(s) {
  return s.replace(/[\u3041-\u3096]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60));
}

function normalizeForCompare(s) {
  return hiraganaToKatakana((s || '').toLowerCase())
    .replace(/[\s　]/g, '')
    .replace(/[「」『』,，。.!！?？:：;；\-_~〜()（）]/g, '');
}

// 編集距離（レーベンシュタイン距離）
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (m === 0) return n;
  if (n === 0) return m;
  const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      dp[i][j] = Math.min(dp[i-1][j] + 1, dp[i][j-1] + 1, dp[i-1][j-1] + cost);
    }
  }
  return dp[m][n];
}

// 0〜1のタイトル類似度（1=完全一致）
function titleSimilarity(a, b) {
  const na = normalizeForCompare(a), nb = normalizeForCompare(b);
  if (!na || !nb) return 0;
  if (na === nb) return 1;
  if (na.includes(nb) || nb.includes(na)) return 0.85; // 部分一致は強めに評価
  const dist = levenshtein(na, nb);
  const maxLen = Math.max(na.length, nb.length);
  return maxLen === 0 ? 0 : 1 - dist / maxLen;
}

// タイトルでGoogle Booksを検索（intitle:優先、ヒットなければ通常検索でも試行）
async function searchGoogleBooksByTitle(title) {
  async function doSearch(q) {
    const url = `${PROXY_BASE_URL}/books/search?q=${encodeURIComponent(q)}`
              + `&maxResults=5&langRestrict=ja&country=JP`;
    const controller = new AbortController();
    const t = setTimeout(() => controller.abort(), 7000);
    try {
      const res = await fetch(url, { signal: controller.signal });
      clearTimeout(t);
      if (!res.ok) return [];
      const data = await res.json();
      if (!data.items) return [];
      return data.items.map(item => {
        const info = item.volumeInfo || {};
        if (!info.title || !info.authors) return null;
        return { title: info.title, author: info.authors.join(', '), categories: info.categories || [] };
      }).filter(Boolean);
    } catch (e) {
      clearTimeout(t);
      return [];
    }
  }

  // intitle:と通常検索を並列で飛ばし、重複を除いてまとめる（直列より高速）
  const [r1, r2] = await Promise.all([
    doSearch(`intitle:${title}`),
    doSearch(title),
  ]);
  const seen = new Set();
  return [...r1, ...r2].filter(b => {
    const k = b.title.toLowerCase();
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  });
}

// 入力タイトル1件を解決する: プリセット → 実在検証 → 類似本 → 最終手段としてハッシュ
async function resolveBookEntry(title) {
  const preset = findPreset(title);
  if (preset) {
    return { params: preset.params, verified: true, source: 'preset', resolvedTitle: preset.canonicalTitle };
  }

  // オフラインモードではネットワークに触れずハッシュ推定のみ
  if (userMode === 'offline') {
    return { params: paramsFromTitleHash(title), verified: false, source: 'offline-hash', resolvedTitle: title };
  }

  try {
    const results = await searchGoogleBooksByTitle(title);
    if (results.length > 0) {
      const scored = results.map(r => ({ r, sim: titleSimilarity(title, r.title) }));
      scored.sort((a, b) => b.sim - a.sim);
      const best = scored[0];
      const params = paramsFromCategories(best.r.title, best.r.categories);
      return {
        params,
        verified: best.sim >= 0.6,
        source: best.sim >= 0.6 ? 'google-verified' : 'google-similar',
        resolvedTitle: best.r.title,
        resolvedAuthor: best.r.author,
        similarity: best.sim,
      };
    }
  } catch (e) {
    // ネットワークエラー等は下のフォールバックへ
  }

  // 検索でも何も見つからない場合の最終手段
  return { params: paramsFromTitleHash(title), verified: false, source: 'hash-fallback', resolvedTitle: title };
}

// カテゴリ配列からパラメータを推定
function paramsFromCategories(title, categories) {
  const catText = (categories || []).join(' ').toLowerCase();
  const seed = hashStr(title);
  const out = {};
  AXES.forEach((ax, i) => {
    const keywords = KEYWORD_MAP[ax.key];
    const hit = keywords.some(k => catText.includes(k.toLowerCase()));
    const base = hit ? 0.55 : 0.25;
    const j = (jitter01(seed, i) - 0.5) * 0.3;
    out[ax.key] = clamp01(base + j);
  });
  return out;
}

// Google Booksのindustry Identifiers(ISBN)からAmazonリンクを組み立てる
// ISBNがない場合はタイトル+著者のAmazon検索URLにフォールバック
function buildAmazonLink(industryIdentifiers, title, authors) {
  if (industryIdentifiers && industryIdentifiers.length > 0) {
    const isbn13 = industryIdentifiers.find(id => id.type === 'ISBN_13');
    const isbn10 = industryIdentifiers.find(id => id.type === 'ISBN_10');
    const isbn = (isbn13 || isbn10) ? (isbn13 || isbn10).identifier : null;
    if (isbn) return `https://www.amazon.co.jp/dp/${isbn}`;
  }
  // ISBNがない場合はタイトル+著者名で検索（必ず表示できる）
  const q = [title, ...(Array.isArray(authors) ? authors.slice(0,1) : [authors])].filter(Boolean).join(' ');
  return `https://www.amazon.co.jp/s?k=${encodeURIComponent(q)}`;
}

// 表紙画像URLを取得（httpはhttpsに強制。Google Booksがhttpを返すことがあるため）
function getThumbnailUrl(imageLinks) {
  if (!imageLinks) return null;
  const url = imageLinks.thumbnail || imageLinks.smallThumbnail || null;
  if (!url) return null;
  return url.replace(/^http:/, 'https:');
}

function euclidean(a, b) {
  return Math.sqrt(AXES.reduce((s, ax) => s + Math.pow((a[ax.key]||0) - (b[ax.key]||0), 2), 0));
}

function pickRandom(arr, n) {
  const pool = [...arr], out = [];
  for (let i = 0; i < n && pool.length; i++) {
    out.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
  }
  return out;
}

function drawRadar(v1, v2, vt) {
  const svg = document.getElementById('radar');
  const N = AXES.length, cx = 160, cy = 130, R = 95;
  const angle = i => (Math.PI * 2 * i / N) - Math.PI / 2;
  let html = '';

  [0.25, 0.5, 0.75, 1].forEach(ratio => {
    const pts = AXES.map((_, i) => {
      const a = angle(i), d = R * ratio;
      return `${cx + d*Math.cos(a)},${cy + d*Math.sin(a)}`;
    }).join(' ');
    html += `<polygon points="${pts}" fill="none" stroke="#dedad4" stroke-width="0.8"/>`;
  });

  AXES.forEach((ax, i) => {
    const a = angle(i), x2 = cx + R*Math.cos(a), y2 = cy + R*Math.sin(a);
    html += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="#dedad4" stroke-width="0.8"/>`;
    const lx = cx + (R+18)*Math.cos(a), ly = cy + (R+18)*Math.sin(a);
    const anchor = Math.abs(Math.cos(a)) < 0.15 ? 'middle' : Math.cos(a) > 0 ? 'start' : 'end';
    html += `<text x="${lx}" y="${ly+4}" font-size="9" fill="#8a847c" text-anchor="${anchor}" font-family="Noto Sans JP,sans-serif">${ax.label}</text>`;
  });

  function polygon(v, color, op) {
    if (!v) return '';
    const pts = AXES.map((ax, i) => {
      const a = angle(i), d = R * Math.max(0, Math.min(1, v[ax.key]||0));
      return `${cx + d*Math.cos(a)},${cy + d*Math.sin(a)}`;
    }).join(' ');
    return `<polygon points="${pts}" fill="${color}" fill-opacity="${op}" stroke="${color}" stroke-width="1.5" stroke-opacity="0.7"/>`;
  }
  function dots(v, color, big) {
    if (!v) return '';
    return AXES.map((ax, i) => {
      const a = angle(i), d = R * Math.max(0, Math.min(1, v[ax.key]||0));
      const x = cx + d*Math.cos(a), y = cy + d*Math.sin(a);
      return big
        ? `<circle cx="${x}" cy="${y}" r="5" fill="${color}" stroke="#fff" stroke-width="2"/>`
        : `<circle cx="${x}" cy="${y}" r="3.5" fill="${color}" opacity="0.85"/>`;
    }).join('');
  }

  html += polygon(v1,'#9b8ec4',.12) + polygon(v2,'#6aaa91',.12);
  if (vt) html += polygon(vt,'#2d4a8a',.15);
  html += dots(v1,'#9b8ec4',false) + dots(v2,'#6aaa91',false);
  if (vt) html += dots(vt,'#2d4a8a',true);

  svg.innerHTML = html;
}
drawRadar(vec1, vec2, null);

// ═══════════════════════════════════════════════════════════
// Google Books API
// ═══════════════════════════════════════════════════════════
async function fetchGoogleBooks(query, maxResults, isRetry) {
  const startIndex = Math.floor(Math.random() * 60);
  const url = `${PROXY_BASE_URL}/books/search?q=${encodeURIComponent(query)}`
            + `&maxResults=${maxResults}&startIndex=${startIndex}`
            + `&langRestrict=ja&country=JP`; // 日本語版・日本で入手可能な本を優先

  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 8000);

  try {
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timeoutId);

    if (res.status === 429) {
      // プロキシ側のレート制限に到達。1回だけ少し待って再試行
      if (!isRetry) {
        await new Promise(r => setTimeout(r, 1500));
        return fetchGoogleBooks(query, maxResults, true);
      }
      throw new Error('HTTP 429（一時的な混雑です。しばらくしてから再試行してください）');
    }
    if (!res.ok) throw new Error('HTTP ' + res.status + '（' + query + '）');

    const data = await res.json();
    if (!data.items) return [];

    return data.items
      .map(item => {
        const info = item.volumeInfo || {};
        if (!info.title || !info.authors) return null;
        const categories = info.categories || [];
        return {
          title: info.title,
          author: info.authors.join(', '),
          categories,
          genre: categories[0] ? categories[0].split('/').pop().trim() : '一般',
          language: info.language || 'ja',
          thumbnail: getThumbnailUrl(info.imageLinks),
          amazonLink: buildAmazonLink(info.industryIdentifiers, info.title, info.authors),
          googleBooksLink: info.infoLink || null,
          pageCount: info.pageCount || null,
          publishedDate: info.publishedDate ? info.publishedDate.slice(0, 4) : null,
          params: paramsFromCategories(info.title, info.categories || []), // ここで一度だけ計算
        };
      })
      .filter(Boolean);
  } catch (e) {
    clearTimeout(timeoutId);
    if (e.name === 'AbortError') throw new Error('タイムアウト（' + query + '）');
    throw e.message ? e : new Error('ネットワークエラー（' + query + '）');
  }
}

// ═══════════════════════════════════════════════════════════
// 選択タグと内蔵DBのgenre文字列をゆるくマッチング
const TAG_GENRE_KEYWORDS = {
  fiction: ['文学', '純文学', '小説'], sf: ['SF', 'sf'], fantasy: ['ファンタジー', '幻想'],
  mystery: ['ミステリ'], philosophy: ['哲学', '思想', '実存'], poetry: ['詩', '随筆'],
  horror: ['ホラー', '怪奇'], biography: ['伝記', '歴史'], essay: ['批評', 'エッセイ'],
  romance: ['恋愛', '青春'], psychology: ['心理'], drama: ['短編', 'ドラマ'],
  jlit: ['日本', '純文学'], dystopia: ['ディストピア'],
};
function filterFallbackByTags(books) {
  if (selectedTagIds.length === 0) return books;
  const keywords = selectedTagIds.flatMap(id => TAG_GENRE_KEYWORDS[id] || []);
  const filtered = books.filter(b => keywords.some(kw => (b.genre || '').includes(kw)));
  return filtered.length > 0 ? filtered : books; // マッチ0件なら全体にフォールバック
}

// フィクション系タグ（物語であることが期待されるタグ）
const FICTION_LEANING_TAGS = ['fiction', 'sf', 'fantasy', 'mystery', 'horror', 'romance', 'drama', 'jlit', 'dystopia'];

// ═══════════════════════════════════════════════════════════
// フィクション判定（ホワイトリスト優先方式）
//
// 旧方式: ブラックリストに引っかかるものを除外（抜け穴が多い）
// 新方式: 「フィクションである」と判定できるものだけ通す
//         どちらとも判断できない場合は除外（母数より精度を優先）
// ═══════════════════════════════════════════════════════════

// Google BooksカテゴリでFictionと判定できるキーワード
const FICTION_CATEGORY_SIGNALS = [
  'fiction', 'novel', 'short stories', 'fantasy', 'science fiction',
  'mystery', 'thriller', 'horror', 'romance', 'literary',
  'juvenile fiction', 'young adult fiction',
  '小説', '文学', 'フィクション', '物語', 'ファンタジー',
];

// カテゴリなし時にタイトルからフィクションと推定できるパターン
const FICTION_TITLE_SIGNALS = [
  /小説$/, /の物語$/, /物語$/, /ものがたり$/,
];

// 明確なノンフィクション除外パターン（タイトルベース）
const NONFICTION_TITLE_PATTERNS = [
  // 資料・目録・索引系
  /文献要覧/, /要覧/, /総覧/, /便覧/, /年表/, /目録/, /目錄/,
  /書目/, /索引/, /総目録/, /総目錄/, /収載/, /収録集/, /所蔵/, /蔵書/,
  /図書館蔵/, /図書館所蔵/, /アーカイブ/, /資料集/, /資料館/, /全情報$/,
  // 辞典・事典・辞書系
  /事典/, /辞典/, /辞書/, /大辞典/, /活用辞典/,
  // 学術・研究系
  /研究文献/, /研究$/, /論集/, /概論/, /講座/, /白書/, /統計/,
  /全国調査/, /調査報告/, /調査書/, /調査研究/,
  /\d{4}\s*[-〜~ー]\s*\d{4}/,  // 年号範囲（要覧・年表の特徴）
  // 文学史・批評・評論系（小説ではなく評論）
  /文学史/, /文学論/, /文学研究/, /文學史/, /文學論/, /文學研究/,
  /史講話/, /史概説/, /史纲/, /史綱/, /史観/,
  /批評/, /評論/, /評伝/, /評伝/, /鑑賞/, /解説$/, /読本$/, /作法$/,
  /文学運動/, /文学論争/, /発生序説/,
  // 全集・選集系
  /全集$/, /全集 /, /選集$/, /叢書/, /文庫全集/, /著作集/,
  // 法律・制度系
  /法律/, /法学/, /法哲学/, /訴訟/, /条文/, /施行規則/, /施行法/,
  /刑事/, /民事/, /行政/, /裁判/,
  // 伝記・ノンフィクション色が強いもの
  /白書$/, /報告書$/, /年報$/, /年鑑$/,
  // 入門・ガイド系（小説以外）
  /入門$/, /ガイド$/, /ハンドブック$/, /マニュアル$/,
  // 引っかかりやすいアカデミック著作集
  /著作集/, /論$/, /論集$/, /研究集/,
  // その他の学術・資料系
  /全情報/, /のなかの/, /にかんする/, /について$/, /に関する/,
];

// タイトルに著者名的な記述が続いていたり副題が学術的なパターン
const NONFICTION_SUBTITLE_PATTERNS = [
  /日本文学の/, /日本文学史/, /文学史の/, /英文學史/, /文學史/,
  /文献/, /文書/, /史料/, /記録/, /レポート/,
];

function looksLikeFiction(title, categories) {
  const t = title || '';

  // Step1: タイトルに明確なノンフィクションシグナル → 即除外
  if (NONFICTION_TITLE_PATTERNS.some(re => re.test(t))) return false;
  if (NONFICTION_SUBTITLE_PATTERNS.some(re => re.test(t))) return false;

  // Step2: カテゴリにFictionシグナルがある → 確実にフィクション
  if (categories && categories.length > 0) {
    const catText = categories.join(' ').toLowerCase();
    if (FICTION_CATEGORY_SIGNALS.some(kw => catText.includes(kw))) return true;
    // カテゴリがあるのにFictionシグナルがない → 疑わしいので除外
    return false;
  }

  // Step3: カテゴリ情報なし → タイトルで推定
  // タイトルにフィクションシグナルがあれば通す
  if (FICTION_TITLE_SIGNALS.some(re => re.test(t))) return true;

  // Step4: どちらとも判断できない場合
  // 条件を厳しくする：短いタイトル（〜12文字）かつひらがな・カタカナを含む
  // （「砂漠」「ハーモニー」→ 通す。「若者たちの神々」→ 14文字で微妙だが許容）
  // 漢字のみ・長いタイトルは学術書・資料の可能性が高いので除外
  const hasKana = /[\u3040-\u30FF]/.test(t); // ひらがな or カタカナ
  const isShortTitle = t.length <= 14;

  // タイトルが長い（21文字以上）はカテゴリなしでも除外（資料系に多い）
  if (t.length >= 21) return false;

  return hasKana && isShortTitle;
}

function filterByFictionIntent(books) {
  const hasFictionTag = selectedTagIds.some(id => FICTION_LEANING_TAGS.includes(id));
  if (!hasFictionTag) return books;
  const filtered = books.filter(b => looksLikeFiction(b.title, b.categories));
  // 絞りすぎた場合は元に戻す（ただし旧方式より厳格にするため閾値を下げる）
  return filtered.length >= 3 ? filtered : books;
}

// 候補プール取得（API優先、失敗時はフォールバック）
// ═══════════════════════════════════════════════════════════
async function getCandidatePool() {
  // 「常にオフライン」モードならネットワークに一切触れない
  if (userMode === 'offline') {
    updateSourceBadge(false, null);
    const fallback = filterFallbackByTags(FALLBACK_BOOKS).map(b => ({
      title: b.title, author: b.author, genre: b.genre, params: b.params,
    }));
    return { books: fallback, source: '内蔵データベース' };
  }

  // タグが選択されていれば選んだタグ全てを検索、未選択なら全ジャンルから2件ランダム抽出
  const queries = selectedTagIds.length > 0
    ? GENRE_TAGS.filter(t => selectedTagIds.includes(t.id)).map(t => t.query)
    : pickRandom(GENRE_QUERIES, 2);

  const settled = await Promise.allSettled(queries.map(q => fetchGoogleBooks(q, 25)));

  const merged = [];
  const errors = [];
  settled.forEach(r => {
    if (r.status === 'fulfilled') merged.push(...r.value);
    else errors.push(r.reason ? (r.reason.message || String(r.reason)) : '不明なエラー');
  });

  // 重複排除
  const seen = new Set();
  let unique = merged.filter(b => {
    const k = b.title.toLowerCase();
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  });

  // フィクション系タグが選択されていればノンフィクションを除外
  unique = filterByFictionIntent(unique);

  if (unique.length >= 5) {
    apiAvailable = true;
    updateSourceBadge(true);
    return { books: unique, source: 'Google Books' };
  }

  // 全クエリ失敗 or 結果が少なすぎる場合のみフォールバック
  apiAvailable = false;
  const detail = errors.length > 0
    ? errors[0] + (location.protocol === 'file:' ? '（file://で開いている場合はローカルサーバー経由を推奨）' : '')
    : '候補が不足（' + unique.length + '件のみ取得）';
  updateSourceBadge(false, detail);

  const fallback = filterFallbackByTags(FALLBACK_BOOKS).map(b => ({
    title: b.title, author: b.author, genre: b.genre, params: b.params,
  }));
  return { books: fallback, source: '内蔵データベース' };
}

// ═══════════════════════════════════════════════════════════
// メインフロー
// ═══════════════════════════════════════════════════════════
async function onFind() {
  hideError(); hideInfo();

  const title1 = document.getElementById('b1').value.trim();
  const title2 = document.getElementById('b2').value.trim();
  const note1  = document.getElementById('b1note').value.trim();
  const note2  = document.getElementById('b2note').value.trim();
  if (!title1 || !title2) { showError('2冊のタイトルを入力してください'); return; }

  // 備考欄がある場合は検索クエリに付加（著者名等で絞り込む）
  const query1 = note1 ? `${title1} ${note1}` : title1;
  const query2 = note2 ? `${title2} ${note2}` : title2;

  document.getElementById('find-btn').disabled = true;
  document.getElementById('result-card').classList.remove('visible');

  try {
    // ── 入力2冊のパラメータ取得（実在検証つき） ──
    setProgress('2冊の本を確認中…');
    const [entry1, entry2] = await Promise.all([
      resolveBookEntry(query1),
      resolveBookEntry(query2),
    ]);
    vec1 = entry1.params;
    vec2 = entry2.params;
    drawRadar(vec1, vec2, null);

    // ── 候補プール取得 ──
    setProgress('本のデータベースを検索中…');
    const { books, source } = await getCandidatePool();

    // ── 各候補にパラメータを付与（fetchGoogleBooks/FALLBACK_BOOKSで既に計算済み） ──
    const candidates = books.filter(b => !rejected.includes(b.title));

    if (candidates.length === 0) {
      rejected = []; // リセットして再試行
      setProgress('');
      onFind();
      return;
    }

    // ── ターゲットベクトル計算（中点 + ノイズ） ──
    const mid = {};
    AXES.forEach(ax => { mid[ax.key] = (vec1[ax.key] + vec2[ax.key]) / 2; });
    const noiseSeed = Date.now() % 100000;
    const target = {};
    AXES.forEach((ax, i) => {
      const n = (jitter01(noiseSeed, i) - 0.5) * 0.25;
      target[ax.key] = clamp01(mid[ax.key] + n);
    });

    // ── 距離計算してソート ──
    const scored = candidates.map(b => ({ book: b, dist: euclidean(b.params, target) }));
    scored.sort((a, b) => a.dist - b.dist);

    const topN = Math.min(5, scored.length);
    const pick = scored[Math.floor(Math.random() * topN)];

    rejected.push(pick.book.title);
    lastRec = pick.book;

    drawRadar(vec1, vec2, pick.book.params);
    setProgress('');
    renderResult(pick.book, pick.dist, source, target);

  } catch (e) {
    console.error(e);
    setProgress('');
    showError('エラーが発生しました: ' + (e.message || String(e)));
  } finally {
    document.getElementById('find-btn').disabled = false;
  }
}

// ═══════════════════════════════════════════════════════════
// 結果レンダリング
// ═══════════════════════════════════════════════════════════
function renderResult(book, dist, source, target) {
  document.getElementById('r-title').textContent  = book.title;
  document.getElementById('r-author').textContent = book.author;
  document.getElementById('r-genre').textContent  = book.genre || '一般';
  document.getElementById('r-source').textContent = source;

  // 出版年・ページ数チップ
  const chips = document.getElementById('r-info-chips');
  chips.innerHTML = '';
  if (book.publishedDate) {
    chips.innerHTML += `<span class="info-chip">📅 ${book.publishedDate}年</span>`;
  }
  if (book.pageCount) {
    chips.innerHTML += `<span class="info-chip">📄 ${book.pageCount}ページ</span>`;
  }

  // 表紙画像
  const thumbEl = document.getElementById('r-thumbnail');
  if (book.thumbnail) {
    thumbEl.src = book.thumbnail;
    thumbEl.alt = book.title + ' の表紙';
    thumbEl.style.display = 'block';
    thumbEl.onerror = () => { thumbEl.style.display = 'none'; };
  } else {
    thumbEl.style.display = 'none';
    thumbEl.removeAttribute('src');
  }

  // Amazonリンク（常に表示）
  const amazonEl = document.getElementById('r-amazon-link');
  amazonEl.href = book.amazonLink || `https://www.amazon.co.jp/s?k=${encodeURIComponent(book.title)}`;

  // Google Booksリンク
  const googleEl = document.getElementById('r-google-link');
  if (book.googleBooksLink) {
    googleEl.href = book.googleBooksLink;
    googleEl.style.display = 'inline-block';
  } else {
    googleEl.style.display = 'none';
  }

  // 一致度バー
  const maxDist = Math.sqrt(AXES.length);
  const pct = Math.max(45, Math.min(98, Math.round((1 - dist / maxDist) * 100)));
  document.getElementById('r-match-pct').textContent = pct + '%';
  document.getElementById('r-match-fill').style.width = pct + '%';

  const card = document.getElementById('result-card');
  card.classList.remove('visible');
  void card.offsetWidth;
  card.classList.add('visible');
}

function onRetry() { onFind(); }
function onAlreadyRead() {
  if (lastRec) rejected.push(lastRec.title + '（既読）');
  onFind();
}

// ═══════════════════════════════════════════════════════════
// 起動時: API疎通確認（裏で軽くテスト）
// ═══════════════════════════════════════════════════════════
async function checkApiOnLoad() {
  if (userMode === 'offline') {
    updateSourceBadge(false, null);
    return;
  }
  try {
    const controller = new AbortController();
    const t = setTimeout(() => controller.abort(), 6000);
    const probeUrl = `${PROXY_BASE_URL}/books/search?q=test&maxResults=1`;
    const res = await fetch(probeUrl, { signal: controller.signal });
    clearTimeout(t);
    if (res.ok) {
      updateSourceBadge(true);
    } else if (res.status === 429) {
      updateSourceBadge(false, 'HTTP 429（一時的な混雑です。しばらくしてから再試行してください）');
    } else {
      updateSourceBadge(false, 'HTTP ' + res.status);
    }
  } catch (e) {
    const detail = e.name === 'AbortError' ? 'タイムアウト' : (e.message || 'ネットワークエラー');
    updateSourceBadge(false, detail);
  }
}
